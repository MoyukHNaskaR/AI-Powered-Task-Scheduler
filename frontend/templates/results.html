<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Scheduler - Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="card large-card">
        <h1>Optimal Schedule</h1>
        
        <div class="summary-box">
            <div><strong>Total Time:</strong> <span id="totalTime">0</span> min</div>
            <div><strong>Deadlines Missed:</strong> <span id="missedCount" class="highlight-error">0</span></div>
            <div>
                <strong>Brain Fatigue:</strong> <span id="finalBrain">0</span>%
                <div class="progress-bar"><div class="progress" id="brainProgress" style="width: 0%; background: #007bff;"></div></div>
            </div>
            <div>
                <strong>Body Fatigue:</strong> <span id="finalBody">0</span>%
                <div class="progress-bar"><div class="progress" id="bodyProgress" style="width: 0%; background: #dc3545;"></div></div>
            </div>
        </div>

        <h3>Timeline</h3>
        <div class="timeline" id="timelineContainer">
            <!-- Timeline injected here -->
        </div>

        <div class="action-buttons">
            <button class="btn secondary" onclick="window.location.href='/tasks'">Back to Tasks</button>
            <button class="btn" onclick="showLogs()">Show Calculations</button>
        </div>
    </div>

    <!-- Logs Modal -->
    <div class="modal" id="logsModal" style="display:none;">
        <div class="modal-content">
            <span class="close-btn" onclick="closeLogs()">&times;</span>
            <h2>Calculation Logs</h2>
            <pre id="logsContent">Loading...</pre>
        </div>
    </div>

    <!-- Add Task Modal -->
    <div class="modal" id="addTaskModal" style="display:none;">
        <div class="modal-content small">
            <span class="close-btn" onclick="closeAddTask()">&times;</span>
            <h2>Add New Task</h2>
            <div class="form-group">
                <label>Task Name</label>
                <input type="text" id="newTaskName">
            </div>
            <div class="form-group">
                <label>Duration (min)</label>
                <input type="number" id="newTaskDuration" min="1">
            </div>
            <div class="form-group">
                <label>Deadline (min, optional)</label>
                <input type="number" id="newTaskDeadline" min="1">
            </div>
            <button class="btn" onclick="submitNewTask()">Analyze & Re-Schedule</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetchResults();
        });
    </script>
</body>
</html>
